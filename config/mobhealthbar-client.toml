[general]
	#Toggle Health bars for mobs
	toogle = true
	#Render health bar only when the mob is visible
	onvisible = true
	#Show health points on bars. Note that not every type of the bars can show the hp
	show_hp = true
	#Show the Name above the mobs. Disabled so Ascendant Nametags owns styled player/hunter/NPC identity text.
	show_name = false
	#Show bars while a mob is actively aggressive, which covers recent combat without proximity-only clutter
	on_aggro = true
	#Show bar texture
	bar = true
	#Show the hp bar of mobs who are damaged
	damaged_only = true
	#Show the hp bar of the mob you are looking at
	hovered_only = true
	#
	#List for mobs that should not be displayed. True boss presentation belongs to Enhanced Boss Bars.
	blacklist = "minecraft:ender_dragon,minecraft:wither"

	#MobHealtBar
	[general.hpbar]
		#Health Bar Type
		#Range: 1 ~ 14
		type = 1
		#X Position
		#Range: > -2147483648
		x-pos = 0
		#Y Position
		#Range: > -2147483648
		y-pos = 0
		#Render Distance
		#Range: > 0
		render-distance = 64
		#Scale Nametag
		#Range: 0.0 ~ 1.7976931348623157E308
		scale-name = 1.0
		#Scale Bar
		#Range: 0.0 ~ 1.7976931348623157E308
		scale-bar = 1.0
		#Scale Numbers
		#Range: 0.0 ~ 1.7976931348623157E308
		scale-nums = 1.0
