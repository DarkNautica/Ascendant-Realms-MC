name: Publish packwiz files to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare pack files
        run: |
          mkdir public
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='dist/' \
            --exclude='server-pack-staging/' \
            --exclude='packwiz-cache/' \
            --exclude='.packwizcache/' \
            --exclude='local-mods/' \
            --exclude='_incoming/' \
            --exclude='logs/' \
            --exclude='crash-reports/' \
            --exclude='world/' \
            ./ public/
          touch public/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
